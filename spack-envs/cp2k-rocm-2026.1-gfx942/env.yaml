# spack-envs/cp2k-rocm-2026.1-gfx942/env.yaml
# This file is the single source of truth for all build configuration.

# ── Container Images ──────────────────────────────────────────────────────
images:
  builder: rocm/dev-ubuntu-24.04:7.2.1-complete
  runtime: rocm/dev-ubuntu-24.04:7.2.1

# ── Mirror Builder ────────────────────────────────────────────────────────
mirror_builder:
  system_pkgs:
    - bash
    - build-essential
    - ca-certificates
    - curl
    - environment-modules
    - gfortran
    - git
    - openssh-client
    - openssh-server
    - pkg-config
    - unzip
    - vim
    - wget
    - rsync
    - nano
    - cmake
    - file
    - automake
    - bzip2
    - xxd
    - xz-utils
    - zstd
    - ninja-build
    - patch
    - pkgconf
    - libncurses-dev
    - libssh-dev
    - libssl-dev
    - libtool-bin
    - lsb-release
    - python3
    - python3-dev
    - python3-pip
    - python3-venv
    - zlib1g-dev
  # Shell oneliner for Ubuntu mirror setup
  pkg_mirror_setup: "sed -i 's|//archive.ubuntu.com|//mirrors.ustc.edu.cn|g; s|//security.ubuntu.com|//mirrors.ustc.edu.cn|g' /etc/apt/sources.list.d/*.sources /etc/apt/sources.list 2>/dev/null || true"
  pkg_install_cmd: "apt-get update -qq && apt-get install -y --no-install-recommends"

# ── Spack Environment ─────────────────────────────────────────────────────
spack:
  env_name: cp2k-env
  # Custom repos — auto-detected by 'url' (git) or 'path' (local) field
  custom_repos:
    # Local repo: includes custom cp2k package.py with ROCm/DLA-Future support
    # Registered with higher priority than builtin → overrides cp2k package
    - path: repos
      namespace: cp2k
    # Git repo: CP2K developer's spack repo (cp2k_dev_repo namespace)
    - url: https://github.com/cp2k/cp2k.git
      branch: v2026.1
      sparse_path: tools/spack/cp2k_dev_repo
      namespace: cp2k_dev_repo

# ── Template Variables ────────────────────────────────────────────────────
template_vars:
  amdgpu_targets: gfx942
  cp2k_branch: v2026.1
  ucx_branch: v1.19.0
  ucc_branch: v1.5.1
  ompi_branch: v5.0.8
