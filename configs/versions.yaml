# HPC Container Build Configuration
# Per-env configuration has moved to spack-envs/<env>/env.yaml
# This file only contains global (cross-env) settings.

# Spack configuration
spack:
  version: "1.1.0"
  use_mirror: true
  mirror_path: "/opt/spack-mirror"

# Build settings
build:
  jobs: 4
  verbose: true
  cache: true
